<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="360" viewBox="0 0 1100 360" role="img" aria-label="Muhammad Haris Awan animated GitHub profile banner">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="38%" stop-color="#0f2f76"/>
      <stop offset="70%" stop-color="#5b21b6"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="pulse" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1100" height="360" rx="26" fill="url(#sky)"/>
  <path d="M0 278 C160 210 278 320 430 260 C608 190 735 250 894 210 C1018 178 1072 202 1100 188 L1100 360 L0 360 Z" fill="#020617" opacity="0.62"/>
  <path d="M0 306 C180 248 296 348 464 286 C644 220 776 286 944 238 C1030 214 1076 220 1100 210" fill="none" stroke="url(#pulse)" stroke-width="3" opacity="0.75">
    <animate attributeName="stroke-dasharray" values="8 24;28 12;8 24" dur="7s" repeatCount="indefinite"/>
  </path>

  <g opacity="0.9" filter="url(#softGlow)">
    <circle cx="120" cy="72" r="3" fill="#bfdbfe">
      <animate attributeName="opacity" values="0.25;1;0.25" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="224" cy="116" r="2.5" fill="#ffffff">
      <animate attributeName="opacity" values="1;0.25;1" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="880" cy="82" r="3.5" fill="#c4b5fd">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="4.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="996" cy="142" r="2.5" fill="#bbf7d0">
      <animate attributeName="opacity" values="1;0.2;1" dur="3.8s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g transform="translate(72 72)">
    <text x="0" y="32" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="19" font-weight="700" fill="#93c5fd" letter-spacing="3">
      MEDICINE + CODE + AUTOMATION
    </text>
    <text x="0" y="104" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="62" font-weight="900" fill="#ffffff">
      Muhammad Haris Awan
    </text>
    <text x="2" y="152" font-family="Cascadia Code, Consolas, monospace" font-size="25" font-weight="700" fill="#dbeafe">
      MBBS student building AI agents and research systems
      <animate attributeName="opacity" values="0.55;1;0.55" dur="2.8s" repeatCount="indefinite"/>
    </text>
    <g transform="translate(0 196)">
      <rect x="0" y="0" width="160" height="38" rx="19" fill="#2563eb" opacity="0.9"/>
      <text x="80" y="25" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="800" fill="#ffffff">AI Agents</text>
      <rect x="176" y="0" width="160" height="38" rx="19" fill="#7c3aed" opacity="0.9"/>
      <text x="256" y="25" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="800" fill="#ffffff">Dashboards</text>
      <rect x="352" y="0" width="190" height="38" rx="19" fill="#0f766e" opacity="0.9"/>
      <text x="447" y="25" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="800" fill="#ffffff">Clinical Research</text>
    </g>
  </g>

  <g transform="translate(820 78)" opacity="0.9">
    <rect x="0" y="0" width="210" height="210" rx="24" fill="#020617" opacity="0.5" stroke="#93c5fd" stroke-opacity="0.35"/>
    <path d="M55 132 L91 84 L126 118 L154 72" fill="none" stroke="url(#pulse)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round">
      <animate attributeName="stroke-dashoffset" values="80;0;80" dur="5s" repeatCount="indefinite"/>
    </path>
    <circle cx="55" cy="132" r="8" fill="#38bdf8"/>
    <circle cx="91" cy="84" r="8" fill="#a78bfa"/>
    <circle cx="126" cy="118" r="8" fill="#22c55e"/>
    <circle cx="154" cy="72" r="8" fill="#f97316"/>
    <text x="105" y="174" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="800" fill="#e0f2fe">shipping useful tools</text>
  </g>
</svg>
